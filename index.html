<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janhavi Varma</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    html {
  scroll-behavior: smooth;
}
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(to right, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    /* Main Section */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.9;
      max-width: 600px;
    }

    .btn {
      margin-top: 20px;
      display: inline-block;
      padding: 12px 25px;
      background: white;
      color: #333;
      border-radius: 25px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #ddd;
    }

    /* About Section */
    .about {
      background: white;
      color: black;
      padding: 80px 20px;
      border-top-left-radius: 40px;
      border-top-right-radius: 40px;
      margin-top: 50px;
    }

    .about h2 {
      margin-bottom: 15px;
    }

    .about p {
      max-width: 600px;
      margin: auto;
      line-height: 1.6;
    }

    /* Footer */
    .footer {
      padding: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <!-- Main Section -->
  <div class="container">
    <h1>Hi, I'm Janhavi 👋</h1>
    <p>Learning Web Development & Building My First Projects</p>

    <a href="https://github.com/janhavi-varma" class="btn">View My GitHub</a>
  </div>

  <!-- About Section -->
  <div class="about">
    <h2>About Me</h2>
    <p>
      I'm currently learning web development and building my skills step by step.
      I enjoy creating simple and clean websites, and this is my first live project.
    </p>
  </div>

  <!-- Footer -->
  <div class="footer">
    © 2026 Janhavi Varma
  </div>

</body>
</html>
